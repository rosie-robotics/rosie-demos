robot: car1
fleet: demofleet
network:
  mode: softap
  ssid: ESP32S3-Car-1
  password: esp32s3-car-1
  connect: tcp/192.168.4.2:7447
base:
  type: diff_drive
  wheel_diameter: 0.068
  wheel_base: 0.13
  ticks_per_rev: 1440
motors:
  driver: tb6612
  pins:
    pwmA: 45
    ain1: 42
    ain2: 47
    pwmB: 46
    bin1: 48
    bin2: 21
  pwm:
    freq: 20000
    res: 8
    min: 55
    max: 100
encoders:
  pins:
    left:
    - 41
    - 38
    right:
    - 39
    - 40
control:
  dt_ms: 20
  teleop:
    kv: 180
    kw: 40
    timeout_ms: 400
    v_fwd: 0.25
    v_turn: 1.2
  goto:
    kp_linear: 0.8
    kp_angular: 1.5
    v_max: 0.35
    w_max: 1.5
    pos_tolerance: 0.025
    approach_dist: 0.2
    align_tol: 0.52
  velocity:
    type: pid
    kp: 0.0
    ki: 0.0
    kd: 0.0
    i_clamp: 0.5
  pose_hz: 20
  presence_hz: 1
imu:
  chip: mpu6050
  i2c:
    sda: 1
    scl: 2
    addr: 104
  yaw_axis: 2
  yaw_sign: -1
camera:
  board: esp32s3_eye
  jpeg_quality: 18
  pub_hz: 2
  enable_default: true
