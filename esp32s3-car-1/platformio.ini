; PlatformIO — ESP32-S3 car (Rosie demo)
;
; Rosie firmware: `rosie mcu setup` (creates lib/rosie).
; Build / flash: `rosie mcu build` / `rosie mcu flash`
; Omit upload_port to auto-detect; or set ROSIE_PORT / pass --port.

[env:esp32s3_cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

lib_ldf_mode = chain
lib_extra_dirs =
    ${platformio.packages_dir}/framework-arduinoespressif32/libraries

build_flags =
    -DBOARD_HAS_PSRAM
    ; Native USB serial on ESP32-S3 (usbmodem) — without this, Serial goes to UART0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DZENOH_COMPILER_GCC
    -DZENOH_ARDUINO_ESP32
    -DZ_FEATURE_MULTI_THREAD=1
    -DZ_FEATURE_PUBLICATION=1
    -DZ_FEATURE_SUBSCRIPTION=1
    -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/Network/src
    -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/NetworkClient/src
    -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/NetworkServer/src
    -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/NetworkUdp/src

lib_deps =
    madhephaestus/ESP32Encoder
    bblanchon/ArduinoJson@^7.2.0
    https://github.com/eclipse-zenoh/zenoh-pico.git
